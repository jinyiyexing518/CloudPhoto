name: Deploy Backend (Azure Functions)

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: server/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: server

      - name: Build TypeScript
        run: yarn build
        working-directory: server

      - name: Azure Login (attempt 1)
        id: azure_login_first
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login (attempt 2)
        id: azure_login_second
        if: steps.azure_login_first.outcome == 'failure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Login
        if: steps.azure_login_first.outcome == 'failure' && steps.azure_login_second.outcome == 'failure'
        run: |
          echo "Azure login failed twice. Please verify OIDC federated credential and subscription access for the configured service principal."
          exit 1

      - name: Create deployment zip
        run: |
          cd server
          zip -r ../deployment.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "src/*" \
            --exclude "tsconfig.json" \
            --exclude "*.test.ts"

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
            --src deployment.zip
